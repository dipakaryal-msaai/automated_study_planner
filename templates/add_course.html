{% extends "base.html" %}

{% block title %}Add Course - Study Planner{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <h1 class="display-4 mb-4">📚 Add New Course</h1>
        
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('add_course') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Course Name *</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               placeholder="e.g., Calculus, Biology, History" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="difficulty" class="form-label">Difficulty Level *</label>
                        <select class="form-select" id="difficulty" name="difficulty" required>
                            <option value="1">1 - Very Easy ⭐</option>
                            <option value="2">2 - Easy ⭐⭐</option>
                            <option value="3" selected>3 - Medium ⭐⭐⭐</option>
                            <option value="4">4 - Hard ⭐⭐⭐⭐</option>
                            <option value="5">5 - Very Hard ⭐⭐⭐⭐⭐</option>
                        </select>
                        <small class="form-text text-muted">
                            Higher difficulty = more study time allocated
                        </small>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Add Course</button>
                        <a href="{{ url_for('view_courses') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
